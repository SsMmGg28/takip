name: CI

# PR'larda ve main'e push'ta kod kalitesini doğrular: lint + typecheck + testler
# + production build. Build, gerçek bir Supabase projesine bağlanmaz; sunucu
# bileşenlerinin istediği env değişkenleri sahte değerlerle sağlanır (prerender
# sırasında ağ çağrısı yapılmaz, yalnızca istemci kurulumu doğrulanır).

on:
  pull_request:
  push:
    branches: [main]

# Aynı dal için eski koşuları iptal et.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Bağımlılıkları kur
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tip kontrolü
        run: npm run typecheck

      - name: Testler
        run: npm run test

      - name: Build (sahte env ile)
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy
          SUPABASE_SERVICE_ROLE_KEY: dummy
          NEXT_PUBLIC_AUTH_EMAIL_DOMAIN: takip.internal
